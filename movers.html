<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Packers & Movers - Mymoon</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="page">

    <!-- NAVBAR -->
    <div class="navbar">
      <div class="logo">Mymoon</div>
    </div>

    <!-- CENTER -->
    <div class="center">
      <div class="container">

        <!-- TITLE -->
        <h1 class="title">
          Find trusted packers & movers
        </h1>

        <!-- FORM -->
        <div class="form-container">

          <!-- QUERY (prefilled) -->
          <div class="form-group">
            <input 
              type="text"
              id="userQuery"
              class="input"
              readonly
            >
          </div>

          <!-- FROM LOCATION -->
          <div class="form-group">
            <input 
              type="text"
              placeholder="Pickup location"
              class="input"
              required
            >
          </div>

          <!-- TO LOCATION -->
          <div class="form-group">
            <input 
              type="text"
              placeholder="Drop location"
              class="input"
              required
            >
          </div>

          <!-- MOVE SIZE -->
          <div class="form-group">
            <select class="input" required>
              <option value="">Move size</option>
              <option>1 BHK</option>
              <option>2 BHK</option>
              <option>3 BHK</option>
              <option>Office shifting</option>
            </select>
          </div>

          <!-- DATE -->
          <div class="form-group">
            <input 
              type="date"
              class="input"
              required
            >
          </div>

          <!-- NAME -->
          <div class="form-group">
            <input 
              type="text"
              placeholder="Your name"
              class="input"
              required
            >
          </div>

          <!-- PHONE -->
          <div class="form-group">
            <input 
              type="tel"
              placeholder="Phone number"
              class="input"
              required
            >
          </div>

          <!-- CTA -->
          <button class="btn">
            Get Free Quotes
          </button>

          <!-- TRUST TEXT -->
          <div class="trust">
            Verified movers · Quick response · Multiple quotes
          </div>

        </div>

      </div>
    </div>

  </div>

  <!-- JS -->
  <script>

    // Prefill search query
    const params = new URLSearchParams(window.location.search);
    const query = params.get("query");

    const input = document.getElementById("userQuery");

    if (query) {
      input.value = query;
    } else {
      input.value = "Packers & Movers";
    }

  </script>

</body>
</html>
