<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Packers & Movers - Mymoon</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="page">

    <!-- NAVBAR -->
    <div class="navbar">
      <div class="logo">Mymoon</div>
    </div>

    <!-- CENTER -->
    <div class="center">
      <div class="container">

        <!-- TITLE -->
        <h1 class="title">
          Find trusted packers & movers
        </h1>

        <!-- FORM -->
        <div class="form-container">

          <form action="https://formspree.io/f/xwvrdjjz" method="POST">

            <!-- Hidden service name -->
            <input type="hidden" name="service" value="Packers & Movers">

            <!-- Redirect after submit -->
            <input type="hidden" name="_redirect" value="https://mymoon-brown.vercel.app/thankyou.html">

            <!-- QUERY -->
            <div class="form-group">
              <input 
                type="text"
                id="userQuery"
                name="query"
                class="input"
                readonly
              >
            </div>

            <!-- FROM -->
            <div class="form-group">
              <input 
                type="text"
                name="pickup_location"
                placeholder="Pickup location"
                class="input"
                required
              >
            </div>

            <!-- TO -->
            <div class="form-group">
              <input 
                type="text"
                name="drop_location"
                placeholder="Drop location"
                class="input"
                required
              >
            </div>

            <!-- SIZE -->
            <div class="form-group">
              <select name="move_size" class="input" required>
                <option value="">Move size</option>
                <option>1 BHK</option>
                <option>2 BHK</option>
                <option>3 BHK</option>
                <option>Office shifting</option>
              </select>
            </div>

            <!-- DATE -->
            <div class="form-group">
              <input 
                type="date"
                name="moving_date"
                class="input"
                required
              >
            </div>

            <!-- NAME -->
            <div class="form-group">
              <input 
                type="text"
                name="name"
                placeholder="Your name"
                class="input"
                required
              >
            </div>

            <!-- PHONE -->
            <div class="form-group">
              <input 
                type="tel"
                name="phone"
                placeholder="Phone number"
                class="input"
                required
              >
            </div>

            <!-- CTA -->
            <button type="submit" class="btn">
              Get Free Quotes
            </button>

            <!-- TRUST -->
            <div class="trust">
              Verified movers · Quick response · Multiple quotes
            </div>

          </form>

        </div>

      </div>
    </div>

  </div>

  <!-- JS -->
  <script>

    // Prefill query from URL
    const params = new URLSearchParams(window.location.search);
    const query = params.get("query");

    const input = document.getElementById("userQuery");

    if (query) {
      input.value = query;
    } else {
      input.value = "Packers & Movers";
    }

  </script>

</body>
</html>
