<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AC Repair Service - Mymoon</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="page">

    <!-- NAVBAR -->
    <div class="navbar">
      <div class="logo">Mymoon</div>
    </div>

    <!-- CENTER -->
    <div class="center">
      <div class="container">

        <!-- TITLE -->
        <h1 class="title">
          Get fast AC repair service
        </h1>

        <!-- FORM -->
        <div class="form-container">

          <!-- QUERY -->
          <div class="form-group">
            <input 
              type="text"
              id="userQuery"
              class="input"
              readonly
            >
          </div>

          <!-- ISSUE TYPE -->
          <div class="form-group">
            <select class="input" required>
              <option value="">What is the issue?</option>
              <option>Not cooling</option>
              <option>Gas refill needed</option>
              <option>Water leakage</option>
              <option>Strange noise</option>
              <option>AC not turning on</option>
              <option>General service</option>
            </select>
          </div>

          <!-- AC TYPE -->
          <div class="form-group">
            <select class="input" required>
              <option value="">AC type</option>
              <option>Split AC</option>
              <option>Window AC</option>
              <option>Central AC</option>
            </select>
          </div>

          <!-- URGENCY -->
          <div class="form-group">
            <select class="input" required>
              <option value="">When do you need service?</option>
              <option>Urgent (today)</option>
              <option>Within 24 hours</option>
              <option>This week</option>
            </select>
          </div>

          <!-- NAME -->
          <div class="form-group">
            <input 
              type="text"
              placeholder="Your name"
              class="input"
              required
            >
          </div>

          <!-- PHONE -->
          <div class="form-group">
            <input 
              type="tel"
              placeholder="Phone number"
              class="input"
              required
            >
          </div>

          <!-- CTA -->
          <button class="btn">
            Book AC Service
          </button>

          <!-- TRUST TEXT -->
          <div class="trust">
            Verified technicians · Fast response · Affordable service
          </div>

        </div>

      </div>
    </div>

  </div>

  <!-- JS -->
  <script>

    // Prefill query
    const params = new URLSearchParams(window.location.search);
    const query = params.get("query");

    const input = document.getElementById("userQuery");

    if (query) {
      input.value = query;
    } else {
      input.value = "AC Repair Service";
    }

  </script>

</body>
</html>
