<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AC Repair Service - Mymoon</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="page">

    <!-- NAVBAR -->
    <div class="navbar">
      <div class="logo">Mymoon</div>
    </div>

    <!-- CENTER -->
    <div class="center">
      <div class="container">

        <!-- TITLE -->
        <h1 class="title">
          Get fast AC repair service
        </h1>

        <!-- FORM -->
        <div class="form-container">

          <form id="leadForm">

            <!-- SERVICE -->
            <input type="hidden" name="service" value="AC Repair">

            <!-- QUERY -->
            <div class="form-group">
              <input 
                type="text"
                id="userQuery"
                name="query"
                class="input"
                readonly
              >
            </div>

            <!-- ISSUE -->
            <div class="form-group">
              <select name="issue" class="input" required>
                <option value="">What is the issue?</option>
                <option>Not cooling</option>
                <option>Gas refill needed</option>
                <option>Water leakage</option>
                <option>Strange noise</option>
                <option>AC not turning on</option>
                <option>General service</option>
              </select>
            </div>

            <!-- AC TYPE -->
            <div class="form-group">
              <select name="ac_type" class="input" required>
                <option value="">AC type</option>
                <option>Split AC</option>
                <option>Window AC</option>
                <option>Central AC</option>
              </select>
            </div>

            <!-- URGENCY -->
            <div class="form-group">
              <select name="urgency" class="input" required>
                <option value="">When do you need service?</option>
                <option>Urgent (today)</option>
                <option>Within 24 hours</option>
                <option>This week</option>
              </select>
            </div>

            <!-- NAME -->
            <div class="form-group">
              <input 
                type="text"
                name="name"
                placeholder="Your name"
                class="input"
                required
              >
            </div>

            <<!-- PHONE -->
<div class="form-group">
  <input 
    type="tel"
    name="phone"
    placeholder="Phone number"
    class="input"
    pattern="[0-9]{10,}"
    minlength="10"
    maxlength="15"
    inputmode="numeric"
    required
  >
</div>
            <!-- SUBMIT -->
            <button type="submit" class="btn" id="submitBtn">
              Book AC Service
            </button>

            <!-- TRUST -->
            <div class="trust">
              Verified technicians · Fast response · Affordable service
            </div>

          </form>

        </div>

      </div>
    </div>

  </div>

  <!-- JS -->
  <script>

    // Prefill query
    const params = new URLSearchParams(window.location.search);
    const query = params.get("query");

    const input = document.getElementById("userQuery");

    if (query) {
      input.value = query;
    } else {
      input.value = "AC Repair Service";
    }

    // Form submit
    const form = document.getElementById("leadForm");
    const btn = document.getElementById("submitBtn");

    form.addEventListener("submit", async function(e) {
      e.preventDefault();

      btn.innerText = "Submitting...";
      btn.disabled = true;

      const formData = new FormData(form);
      const service = formData.get("service") || "service";

      try {
        await fetch("https://formspree.io/f/xwvrdjjz", {
          method: "POST",
          body: formData,
          headers: {
            'Accept': 'application/json'
          }
        });

        window.location.href =
          "https://mymoon-brown.vercel.app/thankyou.html?service=" +
          encodeURIComponent(service);

      } catch (error) {
        alert("Something went wrong. Please try again.");
        btn.innerText = "Book AC Service";
        btn.disabled = false;
      }
    });

  </script>

</body>
</html>
