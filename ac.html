
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO -->
  <title>AC Repair Near Me – Gas Refill & Service | MyMoon</title>
  <meta name="description" content="Book AC repair, gas refill, installation and service near you. Verified technicians, fast response, affordable rates. Split, window and central AC serviced.">
  <meta name="keywords" content="AC repair near me, AC gas refill, air conditioner service, AC installation, split AC repair, window AC repair">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://mymoon-brown.vercel.app/ac.html">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="AC Repair & Service | MyMoon">
  <meta property="og:description" content="Book AC repair, gas refill and service near you. Fast response, affordable rates.">
  <meta property="og:url" content="https://mymoon-brown.vercel.app/ac.html">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="page">

    <!-- NAVBAR -->
    <nav class="navbar" aria-label="Main navigation">
      <a href="index.html" class="logo" aria-label="Back to MyMoon Home">My<span>Moon</span></a>
    </nav>

    <!-- CENTER -->
    <main class="center">
      <div class="container">

        <h1 class="title">
          Book AC repair &amp; service near you
        </h1>

        <div class="form-container fade-in">

          <form id="leadForm" novalidate>

            <input type="hidden" name="service" value="AC Repair">
            <input type="hidden" name="_subject" value="New AC Repair Lead – MyMoon">

            <!-- Query (prefilled) -->
            <div class="form-group">
              <input 
                type="text"
                id="userQuery"
                name="query"
                class="input"
                readonly
                aria-label="Your search query"
              >
            </div>

            <!-- Issue -->
            <div class="form-group">
              <select name="issue" class="input" required aria-label="Describe the AC issue">
                <option value="">What is the issue?</option>
                <option>Not cooling</option>
                <option>Gas refill needed</option>
                <option>Water leakage</option>
                <option>Strange noise</option>
                <option>AC not turning on</option>
                <option>New installation</option>
                <option>Annual service / cleaning</option>
              </select>
            </div>

            <!-- AC Type -->
            <div class="form-group">
              <select name="ac_type" class="input" required aria-label="Type of AC">
                <option value="">AC type</option>
                <option>Split AC</option>
                <option>Window AC</option>
                <option>Cassette / Central AC</option>
              </select>
            </div>

            <!-- Urgency -->
            <div class="form-group">
              <select name="urgency" class="input" required aria-label="When do you need service">
                <option value="">When do you need service?</option>
                <option>Urgent (today)</option>
                <option>Within 24 hours</option>
                <option>This week</option>
                <option>Planning ahead</option>
              </select>
            </div>

            <!-- Name -->
            <div class="form-group">
              <input 
                type="text"
                name="name"
                placeholder="Your full name"
                class="input"
                required
                autocomplete="name"
                aria-label="Your name"
              >
            </div>

            <!-- Phone -->
            <div class="form-group">
              <input 
                type="tel"
                name="phone"
                placeholder="Mobile number"
                class="input"
                pattern="[6-9][0-9]{9}"
                minlength="10"
                maxlength="10"
                inputmode="numeric"
                required
                autocomplete="tel"
                aria-label="Mobile number"
              >
            </div>

            <!-- Submit -->
            <button type="submit" class="btn" id="submitBtn">
              Book AC Service
            </button>

            <p class="trust">
              Verified technicians · Fast response · Affordable rates
            </p>

          </form>

        </div>

      </div>
    </main>

  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const query = params.get("query");
    document.getElementById("userQuery").value = query || "AC Repair Service";

    const form = document.getElementById("leadForm");
    const btn = document.getElementById("submitBtn");

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      const phone = form.querySelector('input[name="phone"]').value;
      if (!/^[6-9][0-9]{9}$/.test(phone)) {
        alert("Please enter a valid 10-digit Indian mobile number.");
        return;
      }

      btn.textContent = "Submitting…";
      btn.disabled = true;

      const formData = new FormData(form);
      const service = formData.get("service") || "service";

      try {
        await fetch("https://formspree.io/f/xwvrdjjz", {
          method: "POST",
          body: formData,
          headers: { Accept: "application/json" }
        });
        window.location.href = "thankyou.html?service=" + encodeURIComponent(service);
      } catch (err) {
        alert("Something went wrong. Please try again.");
        btn.textContent = "Book AC Service";
        btn.disabled = false;
      }
    });
  </script>

</body>
</html>
