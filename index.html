<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Moon - Find trusted services</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="page">

    <!-- NAVBAR -->
    <div class="navbar">
      <div class="logo">My Moon</div>
    </div>

    <!-- CENTER CONTENT -->
    <div class="center">
      <div class="container">

        <!-- HEADLINE -->
        <h1 class="title">
          Find trusted services near you
        </h1>

        <!-- SEARCH FORM -->
        <form id="searchForm">
          <div class="search-box">

            <input 
              type="text"
              id="searchInput"
              class="search-input"
              placeholder="Search for packers, pest control, AC repair..."
              required
            >

            <button type="submit" class="search-btn">
              Search
            </button>

          </div>
        </form>

        <!-- SUGGESTION CHIPS -->
        <div class="chips">
          <div class="chip" onclick="selectService('packers and movers')">Packers & Movers</div>
          <div class="chip" onclick="selectService('pest control')">Pest Control</div>
          <div class="chip" onclick="selectService('ac repair')">AC Repair</div>
        </div>

        <!-- TRUST TEXT -->
        <div class="trust">
          Verified professionals · Quick response · No spam
        </div>

        <!-- SECONDARY SECTION -->
        <div class="section">

          <div class="section-title">
            Popular services
          </div>

          <div class="grid">

            <div class="card" onclick="selectService('interior design')">
              Interior Design
            </div>

            <div class="card" onclick="selectService('solar installation')">
              Solar Installation
            </div>

            <div class="card" onclick="selectService('wedding photography')">
              Wedding Photography
            </div>

          </div>

        </div>

      </div>
    </div>

  </div>

  <!-- JS LOGIC -->
  <script>

    const form = document.getElementById("searchForm");
    const input = document.getElementById("searchInput");

    function selectService(service) {
      input.value = service;
      handleSearch(service);
    }

    form.addEventListener("submit", function(e) {
      e.preventDefault();
      handleSearch(input.value);
    });

    function handleSearch(query) {
      query = query.toLowerCase();

      if (query.includes("pack") || query.includes("move")) {
        window.location.href = "movers.html?query=" + encodeURIComponent(query);
      }
      else if (query.includes("pest") || query.includes("termite")) {
        window.location.href = "pest.html?query=" + encodeURIComponent(query);
      }
      else if (query.includes("ac") || query.includes("cool")) {
        window.location.href = "ac.html?query=" + encodeURIComponent(query);
      }
      else {
        window.location.href = "general.html?query=" + encodeURIComponent(query);
      }
    }

  </script>

</body>
</html>
