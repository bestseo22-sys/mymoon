<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pest Control - Mymoon</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="page">

    <!-- NAVBAR -->
    <div class="navbar">
      <div class="logo">Mymoon</div>
    </div>

    <!-- CENTER -->
    <div class="center">
      <div class="container">

        <!-- TITLE -->
        <h1 class="title">
          Get fast pest control service
        </h1>

        <!-- FORM -->
        <div class="form-container">

          <form id="leadForm">

            <!-- SERVICE -->
            <input type="hidden" name="service" value="Pest Control">

            <!-- QUERY -->
            <div class="form-group">
              <input 
                type="text"
                id="userQuery"
                name="query"
                class="input"
                readonly
              >
            </div>

            <!-- PEST TYPE -->
            <div class="form-group">
              <select name="pest_type" class="input" required>
                <option value="">Select pest problem</option>
                <option>Termite</option>
                <option>Cockroach</option>
                <option>Bed Bugs</option>
                <option>Rodents</option>
                <option>Mosquito</option>
                <option>Other</option>
              </select>
            </div>

            <!-- PROPERTY TYPE -->
            <div class="form-group">
              <select name="property_type" class="input" required>
                <option value="">Property type</option>
                <option>1 BHK</option>
                <option>2 BHK</option>
                <option>3 BHK</option>
                <option>Villa</option>
                <option>Office / Shop</option>
              </select>
            </div>

            <!-- URGENCY -->
            <div class="form-group">
              <select name="urgency" class="input" required>
                <option value="">When do you need service?</option>
                <option>Today</option>
                <option>Within 24 hours</option>
                <option>This week</option>
              </select>
            </div>

            <!-- NAME -->
            <div class="form-group">
              <input 
                type="text"
                name="name"
                placeholder="Your name"
                class="input"
                required
              >
            </div>

            <!-- PHONE -->
            <div class="form-group">
              <input 
                type="tel"
                name="phone"
                placeholder="Phone number"
                class="input"
                required
              >
            </div>

            <!-- SUBMIT -->
            <button type="submit" class="btn" id="submitBtn">
              Get Free Inspection
            </button>

            <!-- TRUST -->
            <div class="trust">
              Safe treatment · Verified experts · Quick response
            </div>

          </form>

        </div>

      </div>
    </div>

  </div>

  <!-- JS -->
  <script>

    // Prefill query
    const params = new URLSearchParams(window.location.search);
    const query = params.get("query");

    const input = document.getElementById("userQuery");

    if (query) {
      input.value = query;
    } else {
      input.value = "Pest Control";
    }

    // Form submit
    const form = document.getElementById("leadForm");
    const btn = document.getElementById("submitBtn");

    form.addEventListener("submit", async function(e) {
      e.preventDefault();

      btn.innerText = "Submitting...";
      btn.disabled = true;

      const formData = new FormData(form);
      const service = formData.get("service") || "service";

      try {
        await fetch("https://formspree.io/f/xwvrdjjz", {
          method: "POST",
          body: formData,
          headers: {
            'Accept': 'application/json'
          }
        });

        window.location.href =
          "https://mymoon-brown.vercel.app/thankyou.html?service=" +
          encodeURIComponent(service);

      } catch (error) {
        alert("Something went wrong. Please try again.");
        btn.innerText = "Get Free Inspection";
        btn.disabled = false;
      }
    });

  </script>

</body>
</html>
